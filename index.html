<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Angad Gogia</title>
  <meta
    name="description"
    content="Angad Gogia's personal website."
  >
  <style>
    :root {
      --background: #ffffff;
      --text: #111111;
      --muted: #555555;
      --link: #111111;
      --link-hover: #000000;
    }

    * {
      box-sizing: border-box;
    }

    html {
      font-size: 16px;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--background);
      color: var(--text);
      font-family: Georgia, "Times New Roman", Times, serif;
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    main {
      width: min(100% - 2rem, 38rem);
      margin: 0 auto;
      padding: 5rem 0 6rem;
    }

    h1,
    h2,
    p,
    ul {
      margin: 0;
    }

    h1 {
      font-size: clamp(2.25rem, 7vw, 3.5rem);
      font-weight: 500;
      line-height: 1.05;
      letter-spacing: -0.03em;
    }

    section {
      margin-top: 4rem;
    }

    h2 {
      margin-bottom: 1rem;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0;
    }

    ul {
      padding-left: 1.25rem;
    }

    li + li {
      margin-top: 0.75rem;
    }

    a {
      color: var(--link);
      text-decoration: underline;
      text-decoration-thickness: 1px;
      text-underline-offset: 0.14em;
    }

    a:hover,
    a:focus-visible {
      color: var(--link-hover);
    }

    .link-note {
      color: var(--muted);
      font-size: 0.95rem;
    }

    @media (max-width: 640px) {
      main {
        width: min(100% - 1.5rem, 38rem);
        padding: 3.5rem 0 4rem;
      }

      section {
        margin-top: 3rem;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Angad Gogia</h1>
    </header>

    <section aria-labelledby="links-heading">
      <h2 id="links-heading">Links</h2>
      <ul>
        <li>
          <a href="http://johnsalvatier.org/blog/2017/reality-has-a-surprising-amount-of-detail">
            Reality has a surprising amount of detail
          </a><span class="link-note">, an essay by John Salvatier.</span>
        </li>
      </ul>
    </section>
  </main>
</body>
</html>

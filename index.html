<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Angad Gogia</title>
  <meta
    name="description"
    content="Angad Gogia."
  >
  <style>
    :root {
      --background: #ffffff;
      --text: #111111;
    }

    * {
      box-sizing: border-box;
    }

    html {
      font-size: 16px;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--background);
      color: var(--text);
      font-family: Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    main {
      width: min(100% - 2rem, 46rem);
      margin: 0 auto;
      padding: 5rem 0 6rem;
    }

    h1 {
      margin: 0;
      font-size: 1rem;
      font-weight: 600;
      line-height: 1.2;
      letter-spacing: 0;
    }

    @media (max-width: 640px) {
      main {
        width: min(100% - 1.5rem, 46rem);
        padding: 3.5rem 0 4rem;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>angad gogia</h1>
  </main>
</body>
</html>

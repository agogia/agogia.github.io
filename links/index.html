<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Links | Angad Gogia</title>
  <meta
    name="description"
    content="Links collected by Angad Gogia."
  >
  <style>
    :root {
      --background: #ffffff;
      --text: #111111;
      --muted: #555555;
      --link: #111111;
      --link-hover: #000000;
    }

    * {
      box-sizing: border-box;
    }

    html {
      font-size: 16px;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--background);
      color: var(--text);
      font-family: Georgia, "Times New Roman", Times, serif;
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    main {
      width: min(100% - 2rem, 46rem);
      margin: 0 auto;
      padding: 5rem 0 6rem;
    }

    h1,
    h2,
    p,
    ul {
      margin: 0;
    }

    h2 {
      margin-bottom: 1rem;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0;
    }

    ul {
      padding-left: 1.25rem;
    }

    li + li {
      margin-top: 0.75rem;
    }

    a {
      color: var(--link);
      text-decoration: underline;
      text-decoration-thickness: 1px;
      text-underline-offset: 0.14em;
    }

    a:hover,
    a:focus-visible {
      color: var(--link-hover);
    }

    .link-note {
      color: var(--muted);
    }

    @media (max-width: 640px) {
      main {
        width: min(100% - 1.5rem, 46rem);
        padding: 3.5rem 0 4rem;
      }
    }
  </style>
</head>
<body>
  <main>
    <section aria-labelledby="links-heading">
      <h2 id="links-heading">Links</h2>
      <ul id="links-list"></ul>
    </section>
  </main>
  <script src="/links.js"></script>
  <script>
    const linksList = document.getElementById("links-list");

    if (Array.isArray(window.siteLinks)) {
      linksList.innerHTML = window.siteLinks
        .map(({ href, title, note }) => {
          const noteText = note ? `<span class="link-note">${note}</span>` : "";
          return `<li><a href="${href}">${title}</a>${noteText}</li>`;
        })
        .join("");
    }
  </script>
</body>
</html>
